<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f5132">
  <title>Каталог МЕТРПОЛА</title>
  <style>
    :root { --bg:#f5f7f6; --card:#fff; --text:#17201c; --muted:#68736d; --accent:#0f6b42; --accent2:#e7f5ed; --line:#dfe6e2; --warn:#9a5a00; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1180px;margin:auto;padding:16px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between}.logo{font-weight:800;font-size:22px;letter-spacing:.02em}.logo span{color:var(--accent)}
    .updated{font-size:12px;color:var(--muted);text-align:right}.controls{display:grid;grid-template-columns:minmax(180px,1fr) 230px 190px;gap:10px;margin-top:14px}
    input,select{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:#fff;color:var(--text);font-size:15px;outline:none} input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,107,66,.1)}
    .summary{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:20px 0 12px;color:var(--muted)} .pill{background:var(--accent2);color:var(--accent);border-radius:999px;padding:7px 11px;font-weight:700;font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;display:flex;flex-direction:column;min-height:240px;box-shadow:0 2px 8px rgba(24,42,33,.035)}
    .category{font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.04em}.name{font-size:16px;font-weight:750;line-height:1.35;margin:8px 0 9px}.meta{font-size:13px;color:var(--muted);min-height:38px}.price{font-size:22px;font-weight:800;margin-top:auto;padding-top:14px}.stock{margin-top:8px;font-size:14px;font-weight:650}.ok{color:var(--accent)}.zero{color:#8a3030}.unknown{color:var(--muted)}.supply{margin-top:6px;color:var(--warn);font-size:13px}.actions{display:flex;gap:8px;margin-top:14px}
    button{border:0;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}.primary{background:var(--accent);color:#fff;flex:1}.secondary{background:#eef2f0;color:var(--text)}
    .empty{padding:50px 20px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:16px}.modal{position:fixed;inset:0;background:rgba(4,14,9,.58);display:none;align-items:flex-end;justify-content:center;z-index:40}.modal.open{display:flex}.sheet{background:#fff;width:min(820px,100%);max-height:92vh;overflow:auto;border-radius:22px 22px 0 0;padding:22px}.sheethead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.close{font-size:23px;background:#eef2f0;padding:4px 10px}.detailname{font-size:22px;font-weight:800;line-height:1.25}.desc{line-height:1.55;color:#38433e;margin:18px 0}.facts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden}.fact{padding:10px 12px;border-bottom:1px solid var(--line)}.fact:nth-child(odd){border-right:1px solid var(--line)}.fact b{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}.detailprice{font-size:26px;font-weight:850;margin:15px 0 6px}
    footer{color:var(--muted);font-size:12px;padding:30px 16px;text-align:center}@media(max-width:720px){.controls{grid-template-columns:1fr}.updated{display:none}.wrap{padding:12px}.grid{grid-template-columns:1fr}.facts{grid-template-columns:1fr}.fact:nth-child(odd){border-right:0}}
  </style>
</head>
<body>
<header><div class="wrap"><div class="top"><div class="logo">МЕТР<span>ПОЛА</span></div><div class="updated" id="updated"></div></div><div class="controls"><input id="search" type="search" placeholder="Поиск по названию, бренду, коллекции…"><select id="category"><option value="">Все категории</option></select><select id="stock"><option value="all">Все товары</option><option value="available">Только в наличии</option><option value="supply">Есть поставка</option></select></div></div></header>
<main class="wrap"><div class="summary"><span id="found"></span><span class="pill" id="total"></span></div><div class="grid" id="grid"></div></main>
<footer>Каталог формируется автоматически из файлов exchange.xml и qty.xml</footer>
<div class="modal" id="modal" aria-hidden="true"><div class="sheet"><div class="sheethead"><div><div class="category" id="mcat"></div><div class="detailname" id="mname"></div></div><button class="close" id="close">×</button></div><div class="detailprice" id="mprice"></div><div id="mstock"></div><div class="desc" id="mdesc"></div><div class="facts" id="mfacts"></div></div></div>
<script src="catalog-data.js"></script>
<script>
const DATA=window.CATALOG_DATA||{meta:{},products:[]}; const $=s=>document.querySelector(s); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtPrice=v=>v!==''&&v!=null?new Intl.NumberFormat('ru-RU').format(Number(v))+' ₽':'Цена по запросу';
const fmtQty=v=>v===null||v===''?'остаток не указан':new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(Number(v));
const supplyText=p=>(p.supply||[]).map(s=>s.text||`${fmtQty(s.qty)} — ${s.date}`).join('; ');
const cats=[...new Set(DATA.products.map(p=>p.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru')); cats.forEach(c=>$('#category').insertAdjacentHTML('beforeend',`<option>${esc(c)}</option>`));
$('#total').textContent=`Всего: ${DATA.products.length}`; $('#updated').textContent='Данные собраны: '+new Date(DATA.meta.generated_at).toLocaleString('ru-RU');
function stockHtml(p){if(p.qty===null||p.qty==='') return '<span class="unknown">Остаток не указан</span>'; const n=Number(p.qty); return `<span class="${n>0?'ok':'zero'}">${n>0?'В наличии: ':'Нет в наличии'}${n>0?fmtQty(n):''}</span>`}
function card(p){const meta=[p.brand,p.collection].filter(Boolean).join(' · '); const sup=supplyText(p); return `<article class="card"><div class="category">${esc(p.category)}</div><div class="name">${esc(p.name)}</div><div class="meta">${esc(meta)}</div><div class="price">${fmtPrice(p.retail_price)}</div><div class="stock">${stockHtml(p)}</div>${sup?`<div class="supply">Поставка: ${esc(sup)}</div>`:''}<div class="actions"><button class="primary" data-open="${esc(p.id)}">Подробнее</button><button class="secondary" data-share="${esc(p.id)}">Поделиться</button></div></article>`}
function render(){const q=$('#search').value.trim().toLowerCase(); const cat=$('#category').value; const sf=$('#stock').value; const list=DATA.products.filter(p=>{const hay=[p.name,p.category,p.brand,p.collection,p.id,Object.values(p.properties||{}).join(' ')].join(' ').toLowerCase(); if(q&&!hay.includes(q))return false;if(cat&&p.category!==cat)return false;if(sf==='available'&&!(Number(p.qty)>0))return false;if(sf==='supply'&&!(p.supply||[]).length)return false;return true}); $('#found').textContent=`Найдено: ${list.length}`; $('#grid').innerHTML=list.length?list.map(card).join(''):'<div class="empty">Ничего не найдено. Измените запрос или фильтры.</div>';}
function openProduct(id){const p=DATA.products.find(x=>x.id===id);if(!p)return;$('#mcat').textContent=p.category;$('#mname').textContent=p.name;$('#mprice').textContent=fmtPrice(p.retail_price);const sup=supplyText(p);$('#mstock').innerHTML='<div class="stock">'+stockHtml(p)+'</div>'+(sup?`<div class="supply">Поставка: ${esc(sup)}</div>`:'');$('#mdesc').textContent=p.description||'Описание не заполнено.';const facts=Object.entries(p.properties||{}).filter(([,v])=>String(v).trim()).map(([k,v])=>`<div class="fact"><b>${esc(k)}</b>${esc(v)}</div>`);$('#mfacts').innerHTML=facts.join('');$('#modal').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){$('#modal').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('input',e=>{if(['search','category','stock'].includes(e.target.id))render()});document.addEventListener('change',e=>{if(['category','stock'].includes(e.target.id))render()});document.addEventListener('click',async e=>{const o=e.target.closest('[data-open]');if(o)openProduct(o.dataset.open);const s=e.target.closest('[data-share]');if(s){const p=DATA.products.find(x=>x.id===s.dataset.share);const text=`${p.name}\n${fmtPrice(p.retail_price)}\n${p.qty!=null?'В наличии: '+fmtQty(p.qty):''}`;try{if(navigator.share)await navigator.share({title:p.name,text});else{await navigator.clipboard.writeText(text);alert('Информация скопирована');}}catch(_){}}if(e.target===$('#modal')||e.target===$('#close'))closeModal();});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});render();
</script>
</body></html>
