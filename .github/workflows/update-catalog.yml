name: Update catalog from FTP

on:
  workflow_dispatch:
  schedule:
    # Every hour at minute 17 (UTC). Exact start can be delayed by GitHub load.
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download XML and build catalog data
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_EXCHANGE_PATH: ${{ secrets.FTP_EXCHANGE_PATH }}
          FTP_QTY_PATH: ${{ secrets.FTP_QTY_PATH }}
          OUTPUT_FILE: _site/catalog-data.js
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll
          python update_catalog.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
